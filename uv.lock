    { name = "asyncpg" },
    { name = "cryptography" },
    { name = "mypy" },
    { name = "pandas" },
    { name = "pandas-stubs" },
    { name = "polars" },
    { name = "pyarrow" },
    { name = "pydantic" },
    { name = "pymongo", extra = ["encryption", "ocsp", "snappy"] },
    { name = "pymssql" },
    { name = "sqlalchemy" },
]

[package.optional-dependencies]
docs = [
    { name = "furo" },
    { name = "pydata-sphinx-theme" },
    { name = "sphinx" },
]
formatting = [
    { name = "pre-commit" },
]

[package.dev-dependencies]
dev = [
    { name = "coverage" },
    { name = "pytest-asyncio" },
    { name = "pytest-mypy" },
]

[package.metadata]
requires-dist = [
    { name = "aiomysql", specifier = ">=0.2.0" },
    { name = "asyncpg", specifier = ">=0.29.0" },
    { name = "cryptography", specifier = ">=43.0.1" },
    { name = "furo", marker = "extra == 'docs'", specifier = ">=2024.8.6" },
    { name = "mypy", specifier = ">=1.11.2" },
    { name = "pandas", specifier = ">=2.2.3" },
    { name = "pandas-stubs", specifier = ">=2.2.2.240909" },
    { name = "polars", specifier = ">=1.8.2" },
    { name = "pre-commit", marker = "extra == 'formatting'", specifier = ">=3.8.0" },
    { name = "pyarrow", specifier = ">=17.0.0" },
    { name = "pydantic", specifier = ">=2.9.2" },
    { name = "pydata-sphinx-theme", marker = "extra == 'docs'", specifier = ">=0.15.4" },
    { name = "pymongo", extras = ["encryption", "ocsp", "snappy"], specifier = ">=4.11.3" },
    { name = "pymssql", specifier = ">=2.3.1" },
    { name = "sphinx", marker = "extra == 'docs'", specifier = ">=8.0.2" },
    { name = "sqlalchemy", specifier = ">=2.0.35" },
]
provides-extras = ["docs", "formatting"]

[package.metadata.requires-dev]
dev = [
    { name = "coverage", specifier = ">=7.8.0" },
    { name = "pytest-asyncio", specifier = ">=0.26.0" },
    { name = "pytest-mypy", specifier = ">=1.0.1" },
]

